<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xebuonho — Tracking Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --bg2: #111827;
            --card: rgba(17, 24, 39, 0.92);
            --border: rgba(75, 85, 99, 0.25);
            --text: #f9fafb;
            --text2: #9ca3af;
            --text3: #6b7280;
            --green: #10b981;
            --green-bg: rgba(16, 185, 129, 0.12);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.12);
            --orange: #f59e0b;
            --orange-bg: rgba(245, 158, 11, 0.12);
            --purple: #8b5cf6;
            --red: #ef4444;
            --red-bg: rgba(239, 68, 68, 0.12);
            --cyan: #06b6d4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .logo {
            font-weight: 800;
            font-size: 1.1rem
        }

        .logo span {
            color: var(--blue)
        }

        .header-badges {
            display: flex;
            gap: 8px
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px
        }

        .badge-green {
            background: var(--green-bg);
            color: var(--green)
        }

        .badge-orange {
            background: var(--orange-bg);
            color: var(--orange)
        }

        .badge-red {
            background: var(--red-bg);
            color: var(--red);
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.5
            }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .clock {
            font-size: 0.82rem;
            color: var(--text2);
            font-weight: 500
        }

        .back-link {
            color: var(--blue);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 500
        }

        /* Layout */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* Sidebar */
        .sidebar {
            width: 340px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 600
        }

        .sidebar-count {
            font-size: 0.72rem;
            color: var(--text3)
        }

        .filter-bar {
            display: flex;
            gap: 4px;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border)
        }

        .filter-btn {
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.68rem;
            font-weight: 500;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text3);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .filter-btn.active {
            background: var(--blue-bg);
            color: var(--blue);
            border-color: rgba(59, 130, 246, 0.3)
        }

        .driver-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0
        }

        .driver-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(75, 85, 99, 0.1);
        }

        .driver-item:hover,
        .driver-item.active {
            background: rgba(59, 130, 246, 0.06)
        }

        .driver-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .driver-icon.online {
            background: var(--green-bg)
        }

        .driver-icon.on_trip {
            background: var(--orange-bg)
        }

        .driver-icon.offline {
            background: rgba(107, 114, 128, 0.15)
        }

        .driver-info {
            flex: 1;
            min-width: 0
        }

        .driver-name {
            font-size: 0.82rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .driver-detail {
            font-size: 0.68rem;
            color: var(--text3)
        }

        .driver-meta {
            text-align: right;
            flex-shrink: 0
        }

        .driver-speed {
            font-size: 0.78rem;
            font-weight: 600
        }

        .driver-battery {
            font-size: 0.65rem;
            color: var(--text3)
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block
        }

        .status-dot.online {
            background: var(--green)
        }

        .status-dot.on_trip {
            background: var(--orange)
        }

        /* Map */
        .map-container {
            flex: 1;
            position: relative
        }

        #map {
            width: 100%;
            height: 100%
        }

        /* Detail Panel (overlay) */
        .detail-panel {
            position: absolute;
            bottom: 20px;
            left: 360px;
            right: 20px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            z-index: 50;
            display: none;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .detail-panel.visible {
            display: flex;
            gap: 20px;
            align-items: center
        }

        .detail-avatar {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--blue-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0
        }

        .detail-main {
            flex: 1
        }

        .detail-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 2px
        }

        .detail-sub {
            font-size: 0.75rem;
            color: var(--text3)
        }

        .detail-stats {
            display: flex;
            gap: 16px;
            margin-top: 6px
        }

        .detail-stat {
            text-align: center
        }

        .detail-stat-val {
            font-size: 0.9rem;
            font-weight: 700
        }

        .detail-stat-label {
            font-size: 0.6rem;
            color: var(--text3);
            text-transform: uppercase
        }

        .detail-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex-shrink: 0
        }

        .detail-btn {
            padding: 7px 14px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .detail-btn-track {
            background: var(--green-bg);
            color: var(--green)
        }

        .detail-btn-call {
            background: var(--blue-bg);
            color: var(--blue)
        }

        .detail-btn-close {
            background: rgba(107, 114, 128, 0.15);
            color: var(--text3)
        }

        /* SOS Alert Banner */
        .sos-banner {
            display: none;
            background: linear-gradient(90deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 20px;
            align-items: center;
            gap: 12px;
            font-size: 0.82rem;
        }

        .sos-banner.visible {
            display: flex
        }

        .sos-text {
            flex: 1;
            color: var(--red);
            font-weight: 600
        }

        /* Map Controls */
        .map-controls {
            position: absolute;
            right: 16px;
            top: 16px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .map-ctrl-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .map-ctrl-btn:hover {
            background: var(--blue-bg);
            border-color: rgba(59, 130, 246, 0.3)
        }

        /* Map info overlay */
        .map-info {
            position: absolute;
            left: 16px;
            top: 16px;
            z-index: 50;
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.75rem;
        }

        .map-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 3px 0
        }

        .map-info-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%
        }

        /* Leaflet overrides */
        .leaflet-container {
            background: var(--bg) !important
        }

        .leaflet-control-zoom a {
            background: var(--bg2) !important;
            color: var(--text) !important;
            border-color: var(--border) !important
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg2) !important;
            color: var(--text) !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important
        }

        .leaflet-popup-tip {
            background: var(--bg2) !important
        }

        .leaflet-popup-content {
            font-family: 'Inter', sans-serif !important;
            font-size: 0.78rem !important;
            margin: 8px 12px !important;
            line-height: 1.5 !important
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">🗺️ <span>Tracking</span> Center</div>
            <div class="header-badges">
                <span class="badge badge-green" id="badge-online">🟢 <span id="count-online">0</span> Online</span>
                <span class="badge badge-orange" id="badge-trip">🚗 <span id="count-trip">0</span> On Trip</span>
                <span class="badge badge-red" id="badge-sos" style="display:none">🚨 SOS</span>
            </div>
        </div>
        <div class="header-right">
            <a href="/" class="back-link">← Admin Dashboard</a>
            <a href="/driver.html" class="back-link">Driver UI →</a>
            <div class="clock" id="clock"></div>
        </div>
    </header>

    <div class="sos-banner" id="sosBanner">
        <div class="sos-text">🚨 TÌNH TRẠNG KHẨN CẤP — Tài xế <span id="sos-driver">--</span> đang cần hỗ trợ!</div>
        <button class="detail-btn detail-btn-call" onclick="focusSOS()">📍 Xem vị trí</button>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">🚗 Tài xế</div>
                <div class="sidebar-count" id="driverCount">0 tài xế</div>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterDrivers('all',this)">Tất cả</button>
                <button class="filter-btn" onclick="filterDrivers('online',this)">Online</button>
                <button class="filter-btn" onclick="filterDrivers('on_trip',this)">Đang chạy</button>
            </div>
            <div class="driver-list" id="driverList"></div>
        </div>

        <div class="map-container">
            <div id="map"></div>

            <div class="map-info">
                <div class="map-info-row">
                    <div class="map-info-dot" style="background:var(--green)"></div> Online - Chờ chuyến
                </div>
                <div class="map-info-row">
                    <div class="map-info-dot" style="background:var(--orange)"></div> Đang thực hiện chuyến
                </div>
                <div class="map-info-row">
                    <div class="map-info-dot" style="background:var(--red)"></div> SOS - Khẩn cấp
                </div>
                <div class="map-info-row">
                    <div class="map-info-dot" style="background:var(--cyan)"></div> Lộ trình đã đi
                </div>
            </div>

            <div class="map-controls">
                <div class="map-ctrl-btn" onclick="centerMap()" title="Center map">🎯</div>
                <div class="map-ctrl-btn" onclick="togglePath()" title="Toggle path">🛤️</div>
                <div class="map-ctrl-btn" onclick="refreshData()" title="Refresh">🔄</div>
            </div>

            <div class="detail-panel" id="detailPanel">
                <div class="detail-avatar" id="detail-avatar">🚗</div>
                <div class="detail-main">
                    <div class="detail-name" id="detail-name">--</div>
                    <div class="detail-sub" id="detail-sub">--</div>
                    <div class="detail-stats">
                        <div class="detail-stat">
                            <div class="detail-stat-val" id="detail-speed">0</div>
                            <div class="detail-stat-label">km/h</div>
                        </div>
                        <div class="detail-stat">
                            <div class="detail-stat-val" id="detail-trips">0</div>
                            <div class="detail-stat-label">Chuyến</div>
                        </div>
                        <div class="detail-stat">
                            <div class="detail-stat-val" id="detail-rating">--</div>
                            <div class="detail-stat-label">Rating</div>
                        </div>
                        <div class="detail-stat">
                            <div class="detail-stat-val" id="detail-battery">--%</div>
                            <div class="detail-stat-label">Pin</div>
                        </div>
                    </div>
                </div>
                <div class="detail-actions">
                    <button class="detail-btn detail-btn-track" onclick="trackDriver()">📍 Theo dõi</button>
                    <button class="detail-btn detail-btn-call">📞 Gọi</button>
                    <button class="detail-btn detail-btn-close" onclick="closeDetail()">✕ Đóng</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ==================== Map Init ==================== */
        const map = L.map('map', {
            center: [10.7769, 106.7009],
            zoom: 14,
            zoomControl: false
        });

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // Dark tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
            maxZoom: 19
        }).addTo(map);

        /* ==================== State ==================== */
        let drivers = [];
        let markers = {};
        let selectedDriverId = null;
        let pathLayer = null;
        let showPath = true;
        let currentFilter = 'all';

        const vehicleEmoji = { car: '🚗', bike: '🏍️', premium: '🚙' };
        const statusColor = { online: '#10b981', on_trip: '#f59e0b' };

        /* ==================== Custom Marker ==================== */
        function createDriverIcon(driver) {
            const color = driver.status === 'on_trip' ? '#f59e0b' : '#10b981';
            const emoji = vehicleEmoji[driver.vehicle] || '🚗';
            const size = selectedDriverId === driver.id ? 44 : 36;
            const border = selectedDriverId === driver.id ? `3px solid ${color}` : `2px solid ${color}`;

            return L.divIcon({
                className: 'driver-marker',
                html: `<div style="
                width:${size}px;height:${size}px;border-radius:50%;
                background:rgba(17,24,39,0.92);border:${border};
                display:flex;align-items:center;justify-content:center;
                font-size:${size / 2.2}px;box-shadow:0 4px 16px rgba(0,0,0,0.4), 0 0 12px ${color}40;
                transition:all 0.3s;
            ">${emoji}</div>`,
                iconSize: [size, size],
                iconAnchor: [size / 2, size / 2]
            });
        }

        /* ==================== Load Drivers ==================== */
        async function loadDrivers() {
            const res = await fetch('/api/v1/driver/location/nearby');
            const data = await res.json();
            drivers = data.drivers;

            // Update counts
            const onlineCount = drivers.filter(d => d.status === 'online').length;
            const tripCount = drivers.filter(d => d.status === 'on_trip').length;
            document.getElementById('count-online').textContent = onlineCount;
            document.getElementById('count-trip').textContent = tripCount;
            document.getElementById('driverCount').textContent = drivers.length + ' tài xế';

            renderDriverList();
            updateMarkers();
            checkSOS();
        }

        function renderDriverList() {
            const list = document.getElementById('driverList');
            const filtered = currentFilter === 'all' ? drivers : drivers.filter(d => d.status === currentFilter);

            list.innerHTML = filtered.map(d => `
            <div class="driver-item ${selectedDriverId === d.id ? 'active' : ''}" onclick="selectDriver(${d.id})">
                <div class="driver-icon ${d.status}">${vehicleEmoji[d.vehicle] || '🚗'}</div>
                <div class="driver-info">
                    <div class="driver-name">
                        <span class="status-dot ${d.status}"></span>
                        ${d.name}
                    </div>
                    <div class="driver-detail">${d.license_plate} · ⭐${d.rating.toFixed(1)} · ${d.trips_today} chuyến</div>
                </div>
                <div class="driver-meta">
                    <div class="driver-speed">${d.speed.toFixed(0)} km/h</div>
                    <div class="driver-battery">🔋 ${d.battery}%</div>
                </div>
            </div>
        `).join('');
        }

        function updateMarkers() {
            drivers.forEach(d => {
                if (markers[d.id]) {
                    markers[d.id].setLatLng([d.lat, d.lng]);
                    markers[d.id].setIcon(createDriverIcon(d));
                } else {
                    markers[d.id] = L.marker([d.lat, d.lng], {
                        icon: createDriverIcon(d)
                    }).addTo(map);
                    markers[d.id].on('click', () => selectDriver(d.id));
                }

                // Update popup
                markers[d.id].bindPopup(`
                <strong>${d.name}</strong><br>
                ${d.license_plate} · ${d.vehicle}<br>
                ⭐ ${d.rating.toFixed(1)} · ${d.trips_today} chuyến<br>
                🔋 ${d.battery}% · ${d.speed.toFixed(0)} km/h
            `);
            });
        }

        /* ==================== Select Driver ==================== */
        function selectDriver(id) {
            selectedDriverId = id;
            const d = drivers.find(x => x.id === id);
            if (!d) return;

            // Update detail panel
            document.getElementById('detail-avatar').textContent = vehicleEmoji[d.vehicle] || '🚗';
            document.getElementById('detail-name').textContent = d.name;
            document.getElementById('detail-sub').textContent = `${d.license_plate} · ${d.vehicle} · ${d.status === 'on_trip' ? '🟡 Đang chạy' : '🟢 Online'}`;
            document.getElementById('detail-speed').textContent = d.speed.toFixed(0);
            document.getElementById('detail-trips').textContent = d.trips_today;
            document.getElementById('detail-rating').textContent = '⭐' + d.rating.toFixed(1);
            document.getElementById('detail-battery').textContent = d.battery + '%';
            document.getElementById('detailPanel').classList.add('visible');

            // Fly to driver
            map.flyTo([d.lat, d.lng], 16, { duration: 0.8 });

            // Update markers to show selection
            updateMarkers();
            renderDriverList();

            // Load path
            if (showPath) loadPath();
        }

        function closeDetail() {
            selectedDriverId = null;
            document.getElementById('detailPanel').classList.remove('visible');
            if (pathLayer) { map.removeLayer(pathLayer); pathLayer = null; }
            updateMarkers();
            renderDriverList();
        }

        /* ==================== Path/Trail ==================== */
        async function loadPath() {
            const res = await fetch('/api/v1/driver/location/history');
            const data = await res.json();

            if (pathLayer) map.removeLayer(pathLayer);
            if (!data.history || data.history.length === 0) return;

            const coords = data.history.map(p => [p.lat, p.lng]);
            pathLayer = L.polyline(coords, {
                color: '#06b6d4',
                weight: 3,
                opacity: 0.7,
                dashArray: '6, 8',
                lineCap: 'round'
            }).addTo(map);
        }

        function togglePath() {
            showPath = !showPath;
            if (!showPath && pathLayer) {
                map.removeLayer(pathLayer);
                pathLayer = null;
            } else if (showPath && selectedDriverId) {
                loadPath();
            }
        }

        /* ==================== SOS ==================== */
        async function checkSOS() {
            const res = await fetch('/api/v1/driver/location/history');
            const data = await res.json();
            const banner = document.getElementById('sosBanner');
            const badge = document.getElementById('badge-sos');

            if (data.sos_active) {
                banner.classList.add('visible');
                badge.style.display = 'flex';
                document.getElementById('sos-driver').textContent = data.driver_name;
            } else {
                banner.classList.remove('visible');
                badge.style.display = 'none';
            }
        }

        function focusSOS() {
            const res = fetch('/api/v1/driver/location/history').then(r => r.json()).then(data => {
                if (data.current_lat && data.current_lng) {
                    map.flyTo([data.current_lat, data.current_lng], 17, { duration: 1 });
                }
            });
        }

        /* ==================== Filter ==================== */
        function filterDrivers(status, el) {
            currentFilter = status;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderDriverList();
        }

        /* ==================== Utils ==================== */
        function centerMap() {
            const bounds = L.latLngBounds(drivers.map(d => [d.lat, d.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        function trackDriver() {
            if (selectedDriverId) loadPath();
        }

        function refreshData() { loadDrivers(); }

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        /* ==================== Init ==================== */
        loadDrivers();
        setInterval(loadDrivers, 5000);
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>

</html>
