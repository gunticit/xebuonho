
services:
  # ==========================================
  # Infrastructure
  # ==========================================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: xebuonho-postgres
    environment:
      POSTGRES_DB: xebuonho
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d xebuonho"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xebuonho-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: xebuonho-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: xebuonho-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  emqx:
    image: emqx/emqx:5.4.0
    container_name: xebuonho-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8883:8883"
      - "18083:18083"
    environment:
      EMQX_NAME: xebuonho
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Dev Tools
  # ==========================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: xebuonho-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: xebuonho
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ==========================================
  # Application Services
  # ==========================================
  api-gateway:
    build:
      context: .
      args:
        SERVICE: api-gateway
    container_name: xebuonho-api-gateway
    ports:
      - "8000:8000"
    environment:
      HTTP_PORT: "8000"
      JWT_SECRET: dev-secret
      RIDE_SERVICE: ride-service:50051
      ORDER_SERVICE: order-service:50058
      MERCHANT_SERVICE: merchant-service:50059
    depends_on:
      - ride-service
      - order-service
      - merchant-service

  ride-service:
    build:
      context: .
      args:
        SERVICE: ride-service
    container_name: xebuonho-ride-service
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      HTTP_PORT: "8080"
      GRPC_PORT: "50051"
      DATABASE_URL: postgresql://app:secret@postgres:5432/xebuonho?sslmode=disable
      REDIS_URL: redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    container_name: xebuonho-order-service
    ports:
      - "8088:8088"
      - "50058:50058"
    environment:
      HTTP_PORT: "8088"
      GRPC_PORT: "50058"
      DATABASE_URL: postgresql://app:secret@postgres:5432/xebuonho?sslmode=disable
      REDIS_URL: redis:6379
      KAFKA_BROKERS: kafka:29092
      MERCHANT_SERVICE: merchant-service:50059
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  merchant-service:
    build:
      context: .
      args:
        SERVICE: merchant-service
    container_name: xebuonho-merchant-service
    ports:
      - "8089:8089"
      - "50059:50059"
    environment:
      HTTP_PORT: "8089"
      GRPC_PORT: "50059"
      DATABASE_URL: postgresql://app:secret@postgres:5432/xebuonho?sslmode=disable
      REDIS_URL: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      args:
        SERVICE: notification-service
    container_name: xebuonho-notification-service
    ports:
      - "8092:8092"
    environment:
      HTTP_PORT: "8092"
      KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  emqx_data:
