syntax = "proto3";

package merchant;

option go_package = "github.com/xebuonho/proto/merchant";

import "proto/common/common.proto";
import "google/protobuf/timestamp.proto";

// ==========================================
// Merchant Service - Nhà hàng, Cửa hàng
// ==========================================
service MerchantService {
    // Lấy danh sách nhà hàng/cửa hàng gần
    rpc ListNearbyMerchants(ListNearbyMerchantsRequest) returns (ListNearbyMerchantsResponse);

    // Lấy thông tin merchant
    rpc GetMerchant(GetMerchantRequest) returns (Merchant);

    // Lấy menu/catalog
    rpc GetMenu(GetMenuRequest) returns (GetMenuResponse);

    // Tìm kiếm merchant
    rpc SearchMerchants(SearchMerchantsRequest) returns (ListNearbyMerchantsResponse);

    // Validate & tính giá items
    rpc ValidateAndPriceItems(ValidateItemsRequest) returns (ValidateItemsResponse);

    // Merchant xác nhận đơn
    rpc ConfirmOrder(MerchantConfirmOrderRequest) returns (MerchantConfirmOrderResponse);

    // Merchant cập nhật trạng thái chuẩn bị
    rpc UpdatePreparationStatus(UpdatePreparationStatusRequest) returns (UpdatePreparationStatusResponse);

    // === Merchant Management ===
    rpc CreateMerchant(CreateMerchantRequest) returns (Merchant);
    rpc UpdateMerchant(UpdateMerchantRequest) returns (Merchant);
    rpc CreateMenuItem(CreateMenuItemRequest) returns (MenuItem);
    rpc UpdateMenuItem(UpdateMenuItemRequest) returns (MenuItem);
    rpc ToggleItemAvailability(ToggleItemRequest) returns (MenuItem);
}

// ==========================================
// Discovery
// ==========================================
message ListNearbyMerchantsRequest {
    double latitude = 1;
    double longitude = 2;
    double radius_km = 3;
    string category = 4;      // "restaurant", "grocery_store", "cafe", "" for all
    string sort_by = 5;        // "distance", "rating", "popular"
    common.PaginationRequest pagination = 6;
}

message ListNearbyMerchantsResponse {
    repeated MerchantSummary merchants = 1;
    common.PaginationResponse pagination = 2;
}

message GetMerchantRequest {
    string merchant_id = 1;
}

message SearchMerchantsRequest {
    string query = 1;          // "phở", "pizza", "siêu thị"
    double latitude = 2;
    double longitude = 3;
    double radius_km = 4;
    common.PaginationRequest pagination = 5;
}

// ==========================================
// Menu
// ==========================================
message GetMenuRequest {
    string merchant_id = 1;
}

message GetMenuResponse {
    repeated MenuCategory categories = 1;
}

message MenuCategory {
    string name = 1;           // "Món chính", "Đồ uống"
    repeated MenuItem items = 2;
}

message ValidateItemsRequest {
    string merchant_id = 1;
    repeated ItemRequest items = 2;
}

message ItemRequest {
    string menu_item_id = 1;
    int32 quantity = 2;
    repeated MerchantOptionSelection options = 3;
}

message MerchantOptionSelection {
    string option_name = 1;
    string value = 2;
}

message ValidateItemsResponse {
    bool valid = 1;
    double total_price = 2;
    int32 estimated_prep_time_min = 3;
    repeated ValidatedItem items = 4;
    repeated string errors = 5; // "Phở bò đã hết"
}

message ValidatedItem {
    string menu_item_id = 1;
    string name = 2;
    int32 quantity = 3;
    double unit_price = 4;
    double total_price = 5;
    bool is_available = 6;
}

// ==========================================
// Order Handling (Merchant side)
// ==========================================
message MerchantConfirmOrderRequest {
    string order_id = 1;
    string merchant_id = 2;
    bool accepted = 3;
    int32 estimated_prep_time_min = 4;
    string reject_reason = 5;
}

message MerchantConfirmOrderResponse {
    bool success = 1;
}

message UpdatePreparationStatusRequest {
    string order_id = 1;
    string merchant_id = 2;
    string status = 3; // "preparing", "almost_ready", "ready"
}

message UpdatePreparationStatusResponse {
    bool success = 1;
}

// ==========================================
// Merchant Management
// ==========================================
message CreateMerchantRequest {
    string owner_id = 1;
    string name = 2;
    string description = 3;
    string category = 4;
    string phone = 5;
    common.Address address = 6;
    string logo_url = 7;
}

message UpdateMerchantRequest {
    string merchant_id = 1;
    string name = 2;
    string description = 3;
    string phone = 4;
    string logo_url = 5;
    string operating_hours_json = 6;
    bool is_active = 7;
}

message CreateMenuItemRequest {
    string merchant_id = 1;
    string category_name = 2;
    string name = 3;
    string description = 4;
    double price = 5;
    string image_url = 6;
    int32 preparation_time_min = 7;
    string options_json = 8; // JSON array of options
}

message UpdateMenuItemRequest {
    string item_id = 1;
    string name = 2;
    string description = 3;
    double price = 4;
    string image_url = 5;
    bool is_available = 6;
}

message ToggleItemRequest {
    string item_id = 1;
    bool is_available = 2;
}

// ==========================================
// Domain Models
// ==========================================
message Merchant {
    string id = 1;
    string owner_id = 2;
    string name = 3;
    string description = 4;
    string category = 5;
    string phone = 6;
    common.Address address = 7;
    string logo_url = 8;
    string cover_url = 9;
    float rating = 10;
    int32 total_orders = 11;
    bool is_active = 12;
    bool is_verified = 13;
    string operating_hours_json = 14;
    double commission_rate = 15;
    bool is_open_now = 16;
    double distance_km = 17;     // Populated in search results
    int32 delivery_time_min = 18; // Estimated delivery time
}

message MerchantSummary {
    string id = 1;
    string name = 2;
    string category = 3;
    string logo_url = 4;
    float rating = 5;
    int32 total_orders = 6;
    double distance_km = 7;
    int32 delivery_time_min = 8;
    bool is_open_now = 9;
    string price_range = 10; // "$", "$$", "$$$"
}

message MenuItem {
    string id = 1;
    string merchant_id = 2;
    string category_name = 3;
    string name = 4;
    string description = 5;
    double price = 6;
    string image_url = 7;
    bool is_available = 8;
    int32 preparation_time_min = 9;
    repeated MenuOption options = 10;
}

message MenuOption {
    string name = 1;       // "Size", "Topping", "Đường"
    bool required = 2;
    bool multi_select = 3;
    repeated MenuOptionChoice choices = 4;
}

message MenuOptionChoice {
    string name = 1;       // "M", "L", "XL"
    double extra_price = 2; // 0, 10000, 20000
}
