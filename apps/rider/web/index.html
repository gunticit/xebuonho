<!DOCTYPE html>
<html lang="vi">

<head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Xebuonho — Đặt xe, đặt đồ ăn, chia bill nhanh chóng">
    <meta name="theme-color" content="#0B0F1A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Xebuonho">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

    <link rel="apple-touch-icon" href="icons/Icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">

    <title>Xebuonho — Đi đâu cũng có</title>

    <style>
        :root {
            --bg: #0B0F1A;
            --bg2: #111827;
            --blue: #3B82F6;
            --text: #F9FAFB;
            --text3: #6B7280;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100%;
        }

        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.08) 0%, var(--bg) 70%);
            z-index: 9999;
            transition: opacity 0.4s ease;
        }

        #splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .splash-logo {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            background: rgba(59, 130, 246, 0.15);
            border: 2px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            animation: pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .splash-title {
            margin-top: 24px;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text);
            animation: fade 0.6s 0.2s ease both;
        }

        .splash-subtitle {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text3);
            font-weight: 500;
            animation: fade 0.6s 0.4s ease both;
        }

        .splash-spinner {
            margin-top: 40px;
            width: 24px;
            height: 24px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes pop {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div id="splash">
        <div class="splash-logo">🏍️</div>
        <div class="splash-title">Xebuonho</div>
        <div class="splash-subtitle">Đi đâu cũng có</div>
        <div class="splash-spinner"></div>
    </div>

    <script>
        // Hide splash once Flutter has rendered the first frame
        window.addEventListener('flutter-first-frame', function () {
            var splash = document.getElementById('splash');
            if (splash) {
                splash.classList.add('fade-out');
                setTimeout(function () { splash.remove(); }, 400);
            }
        });
    </script>
    <script src="flutter_bootstrap.js" async></script>
</body>

</html>
